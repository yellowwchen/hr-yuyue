<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR业务预约 - 入口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #4F6EF7 0%, #3A54DB 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; width: 100%; max-width: 380px;
      border-radius: 20px; padding: 36px 28px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #4F6EF7, #3A54DB);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 26px; font-weight: 800;
    }
    h1 { font-size: 20px; color: #2D3436; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #636E72; margin-bottom: 28px; }
    .btn {
      display: block; width: 100%; padding: 15px; margin-bottom: 12px;
      border-radius: 14px; font-size: 15px; font-weight: 700; text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: #4F6EF7; color: #fff; box-shadow: 0 6px 18px rgba(79,110,247,.3); }
    .btn-outline { background: #fff; color: #4F6EF7; border: 2px solid #4F6EF7; }
    .foot { font-size: 11px; color: #999; margin-top: 18px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">HR</div>
    <h1>HR 业务预约</h1>
    <p class="sub">选择入口进入</p>
    <a class="btn btn-primary" href="user.html">员工预约入口</a>
    <a class="btn btn-outline" href="admin.html">HR 管理端</a>
    <p class="foot">员工在此提交 HR 业务预约<br>HR 在管理端实时接收并处理</p>
  </div>
</body>
</html>
