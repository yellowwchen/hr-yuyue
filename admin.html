<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR业务预约 - 管理端</title>
    <style>
        :root {
            --primary: #4F6EF7;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-light: #999;
            --border: #E8ECF1;
            --success: #00B894;
            --danger: #E17055;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --radius: 14px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #E8ECF1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: var(--bg);
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2), 0 0 0 3px #1a1a1a, 0 0 0 6px #2d2d2d;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: #FFFFFF;
            padding: 14px 28px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .notch-bar {
            display: flex;
            justify-content: center;
            padding: 0 0 4px;
            background: #FFFFFF;
            flex-shrink: 0;
        }
        .notch {
            width: 100px;
            height: 28px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .nav-header {
            background: #FFFFFF;
            padding: 12px 20px 14px;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-header .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #FFEEEA;
            color: #D63031;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-content::-webkit-scrollbar {
            width: 0;
        }

        .stat-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .stat-item {
            flex: 1;
            background: #FFF;
            padding: 12px 6px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
        }
        .stat-item.active {
            background: #EEF2FF;
            box-shadow: 0 0 0 2px var(--primary);
        }
        .stat-num {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: block;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .record-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .record-card.status-confirmed {
            border-left-color: var(--success);
        }
        .record-card.status-rejected {
            border-left-color: var(--danger);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .record-type {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }
        .record-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .status-pending {
            background: #FFF8E7;
            color: #C79100;
        }
        .status-confirmed {
            background: #E6FAF3;
            color: #00875A;
        }
        .status-rejected-tag {
            background: #FFEEEA;
            color: #D63031;
        }
        .record-detail {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .record-detail span {
            display: inline-block;
            margin-right: 14px;
        }
        .record-time {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .btn-success {
            background: var(--success);
            color: #FFF;
        }
        .btn-danger {
            background: var(--danger);
            color: #FFF;
        }

        .toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2D3436;
            color: #FFF;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        @media (max-width: 440px) {
            .phone-frame {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>5G ▮▮▮▮ 🔋</span>
        </div>
        <div class="notch-bar"><div class="notch"></div></div>
        <div class="nav-header">
            <span>预约管理</span>
            <span class="badge">管理端</span>
        </div>

        <div class="toast" id="toast"></div>

        <div class="scroll-content">
            <div class="stat-bar" id="statBar">
                <div class="stat-item active" data-filter="all" onclick="setFilter('all', this)">
                    <span class="stat-num" id="statAll">0</span>
                    <span class="stat-label">全部</span>
                </div>
                <div class="stat-item" data-filter="pending" onclick="setFilter('pending', this)">
                    <span class="stat-num" id="statPending">0</span>
                    <span class="stat-label">待处理</span>
                </div>
                <div class="stat-item" data-filter="confirmed" onclick="setFilter('confirmed', this)">
                    <span class="stat-num" id="statConfirmed">0</span>
                    <span class="stat-label">已确认</span>
                </div>
                <div class="stat-item" data-filter="rejected" onclick="setFilter('rejected', this)">
                    <span class="stat-num" id="statRejected">0</span>
                    <span class="stat-label">已拒绝</span>
                </div>
            </div>

            <div id="recordsList"></div>
            <div class="empty-state" id="emptyState">暂无预约申请</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="db.js"></script>
    <script>
        // ==================== 数据来源：云端 Supabase（与用户端实时共享） ====================
        let reservations = [];
        let filter = 'all';

        async function loadReservations() {
            try {
                reservations = await DB.list();
            } catch (e) {
                reservations = [];
                showToast('加载失败：' + (e.message || e), 'error');
            }
        }

        function saveReservations() {
            // 数据由云端持久化，前端不再写入本地
        }

        async function init() {
            try {
                await DB.init();
            } catch (e) {
                showToast('未连接到云端，请在 config.js 填入 Supabase 密钥', 'error');
                return;
            }
            loadReservations().then(() => { updateStats(); renderRecords(); });
            // 实时监听云端变更（用户端一提交，管理端即刻出现新记录）
            DB.subscribe(() => {
                loadReservations().then(() => { updateStats(); renderRecords(); });
            });
        }

        function updateStats() {
            document.getElementById('statAll').textContent = reservations.length;
            document.getElementById('statPending').textContent = reservations.filter(r => r.status === 'pending').length;
            document.getElementById('statConfirmed').textContent = reservations.filter(r => r.status === 'confirmed')
                .length;
            document.getElementById('statRejected').textContent = reservations.filter(r => r.status === 'rejected').length;
        }

        function setFilter(f, el) {
            filter = f;
            document.querySelectorAll('#statBar .stat-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            renderRecords();
        }

        function renderRecords() {
            const container = document.getElementById('recordsList');
            const emptyState = document.getElementById('emptyState');
            let filtered = reservations;
            if (filter === 'pending') filtered = reservations.filter(r => r.status === 'pending');
            else if (filter === 'confirmed') filtered = reservations.filter(r => r.status === 'confirmed');
            else if (filter === 'rejected') filtered = reservations.filter(r => r.status === 'rejected');

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            container.innerHTML = filtered.map(r => {
                const statusMap = {
                    pending: { cls: '', tag: 'status-pending', text: '待处理' },
                    confirmed: { cls: 'status-confirmed', tag: 'status-confirmed', text: '已确认' },
                    rejected: { cls: 'status-rejected', tag: 'status-rejected-tag', text: '已拒绝' },
                    cancelled: { cls: '', tag: '', text: '已取消' }
                };
                const s = statusMap[r.status] || statusMap.pending;
                return `
            <div class="record-card ${s.cls}">
              <div class="record-header">
                <span class="record-type">${r.bizType}</span>
                <span class="record-status ${s.tag}">${s.text}</span>
              </div>
              <div class="record-detail"><span>申请人：${r.oaAccount}</span></div>
              <div class="record-detail"><span>地点：${r.location}</span></div>
              <div class="record-detail"><span>时间：${r.date} ${r.time}</span></div>
              <div class="record-time">提交于 ${new Date(r.createdAt).toLocaleString('zh-CN')}</div>
              ${r.status === 'pending' ? `
              <div class="action-row">
                <button class="btn btn-success" onclick="confirmReservation('${r.id}')">确认预约</button>
                <button class="btn btn-danger" onclick="rejectReservation('${r.id}')">拒绝预约</button>
              </div>` : ''}
              ${r.status === 'confirmed' ? `
              <div class="action-row">
                <button class="btn btn-danger" onclick="rejectReservation('${r.id}')">改为拒绝</button>
              </div>` : ''}
              ${r.status === 'rejected' ? `
              <div class="action-row">
                <button class="btn btn-success" onclick="confirmReservation('${r.id}')">改为确认</button>
              </div>` : ''}
            </div>`;
            }).join('');
        }

        async function confirmReservation(id) {
            try {
                await DB.update(id, 'confirmed');
                showToast('预约已确认', 'success');
                loadReservations().then(() => { updateStats(); renderRecords(); });
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        async function rejectReservation(id) {
            try {
                await DB.update(id, 'rejected');
                showToast('预约已拒绝', 'error');
                loadReservations().then(() => { updateStats(); renderRecords(); });
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        init();
    </script>
</body>
</html>
