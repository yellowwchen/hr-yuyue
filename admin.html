<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR 业务预约系统</title>
    <style>
        :root {
            --primary: #2B7DE9;
            --primary-light: #EBF2FF;
            --bg: #F5F8FC;
            --card-bg: #FFFFFF;
            --text: #1A1A2E;
            --text-secondary: #6B778C;
            --text-light: #A0ABB8;
            --border: #E4E9F0;
            --required: #E74C3C;
            --success: #27AE60;
            --danger: #E74C3C;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 10px;
            --radius-xs: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ===== 手机框容器 ===== */
        .app-shell {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg);
            position: relative;
        }

        /* ===== 登录层 ===== */
        .login-view {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #2B7DE9 0%, #1E57A8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
        }
        .login-view.hidden { display: none; }
        .login-card {
            background: #fff;
            width: 100%;
            max-width: 340px;
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            box-shadow: 0 24px 64px rgba(0,0,0,.22);
            text-align: center;
        }
        .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .login-card .sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .login-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
            margin-bottom: 14px;
            text-align: center;
        }
        .login-input:focus { border-color: var(--primary); }
        .login-hint { font-size: 12.5px; color: var(--danger); min-height: 18px; margin-bottom: 6px; }
        .btn-login {
            width: 100%; padding: 14px; border-radius: var(--radius-sm);
            background: var(--primary); color: #fff; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px;
        }
        .btn-login:active { opacity: .88; }
        .login-tip { font-size: 11.5px; color: #B0BCC8; margin-top: 16px; line-height: 1.6; }

        /* ===== 主应用容器 ===== */
        #app {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ===== 顶部导航栏（标题+badge） ===== */
        .top-header {
            background: #fff;
            padding: 17px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .top-header h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .admin-badge {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* ===== 已登录状态条 ===== */
        .logged-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: var(--primary-light);
            font-size: 12.5px;
            font-weight: 600;
            color: var(--primary);
            flex-shrink: 0;
        }
        .logged-bar .logout-btn {
            color: var(--danger); font-weight: 600; cursor: pointer;
            padding: 2px 8px; border-radius: 4px;
        }

        /* ===== 胶囊 Tab 切换 ===== */
        .tab-switch {
            display: flex;
            gap: 0;
            padding: 12px 20px 0;
            flex-shrink: 0;
        }
        .tab-pill {
            flex: 1;
            text-align: center;
            padding: 11px 0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            color: var(--text-secondary);
            background: transparent;
            transition: color .2s;
        }
        .tab-pill.active {
            color: var(--primary);
            background: #fff;
            box-shadow: 0 -2px 10px rgba(43,125,233,.08);
        }

        /* ===== 内容区 ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 20px 30px;
            background: var(--bg);
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* ===== 统计卡片 ===== */
        .stat-bar {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .stat-item {
            flex: 1;
            background: #fff;
            padding: 14px 8px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.03);
            cursor: pointer;
            transition: all .2s;
        }
        .stat-item.active {
            background: var(--primary-light);
            box-shadow: 0 0 0 2px var(--primary);
        }
        .stat-num {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            display: block;
        }
        .stat-label {
            font-size: 11.5px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        /* ===== 记录卡片 ===== */
        .record-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 18px 18px 16px;
            margin-bottom: 12px;
            margin-top: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.03);
            border-left: 4px solid var(--primary);
        }
        .record-card.status-confirmed { border-left-color: var(--success); }
        .record-card.status-rejected { border-left-color: var(--danger); }
        .rc-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rc-type { font-weight: 700; font-size: 15px; }
        .rc-status {
            font-size: 11.5px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
        }
        .st-pending { background: #FFF9ED; color: #D4940A; }
        .st-confirmed { background: #EDFBF4; color: #1D8A52; }
        .st-rejected { background: #FEECEC; color: #D63C31; }
        .st-cancelled { background: #F5F5F5; color: #999; }
        .rc-detail {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .rc-detail span { display: inline-block; margin-right: 14px; }
        .rc-time {
            font-size: 11.5px;
            color: var(--text-light);
            margin-top: 8px;
        }
        .rc-action {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .btn-action {
            flex: 1;
            padding: 9px 0;
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: opacity .15s;
        }
        .btn-action:active { opacity: .78; }
        .btn-confirm { background: var(--success); color: #fff; }
        .btn-reject { background: var(--danger); color: #fff; }

        /* ===== 记录卡片可点（查看详情） ===== */
        .record-card { cursor: pointer; transition: box-shadow .2s, transform .1s; }
        .record-card:active { transform: scale(.99); }
        .rc-more {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }
        .rc-more .arrow { color: #C2CCDA; font-weight: 700; }

        /* ===== 详情弹窗 ===== */
        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 300;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }
        .detail-overlay.show { opacity: 1; pointer-events: auto; }
        .detail-sheet {
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 24px 22px 30px;
            width: 100%;
            max-width: 500px;
            max-height: 88vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform .3s cubic-bezier(.32,.72,0,1);
        }
        .detail-overlay.show .detail-sheet { transform: translateY(0); }
        .detail-title {
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .detail-title .back {
            position: absolute;
            left: 22px;
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 13px 2px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .detail-row .k { color: var(--text-secondary); flex-shrink: 0; margin-right: 16px; }
        .detail-row .v { color: var(--text); font-weight: 600; text-align: right; }
        .detail-reason-box {
            margin-top: 14px;
            background: #FEF5F6;
            border: 1px solid #FDD8DC;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 13.5px;
            color: #C0392B;
            line-height: 1.6;
        }
        .detail-reason-box .rh { font-weight: 700; margin-bottom: 4px; display: block; }
        .detail-actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }
        .detail-actions .btn-action { flex: 1; padding: 13px 0; font-size: 15px; border-radius: 25px; }

        /* ===== 拒绝原因输入 ===== */
        .reason-label {
            font-size: 14px;
            font-weight: 600;
            margin: 18px 0 10px;
            color: var(--text);
        }
        .reason-input {
            width: 100%;
            min-height: 96px;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            color: var(--text);
        }
        .reason-input:focus { border-color: var(--danger); }
        .reason-hint { font-size: 12px; color: var(--danger); min-height: 16px; margin-top: 6px; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
            font-size: 14.5px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(26,26,46,.88);
            color: #fff;
            padding: 11px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: all .25s ease;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: rgba(39,174,96,.92); }
        .toast.error { background: rgba(231,76,60,.92); }
    </style>
</head>
<body>
    <div class="app-shell">

    <!-- ===== 登录层 ===== -->
    <div class="login-view" id="loginView">
        <div class="login-card">
            <h2>HR 业务预约系统</h2>
            <p class="sub">HR 管理员请用 OA 账号登录</p>
            <input type="text" class="login-input" id="loginOA" placeholder="OA账号" maxlength="40" autocomplete="username">
            <input type="password" class="login-input" id="loginPwd" placeholder="密码（至少6位）" autocomplete="current-password">
            <div class="login-hint" id="loginHint"></div>
            <button class="btn-login" id="loginBtn" onclick="handleLogin()">登录 / 注册</button>
            <p class="login-tip">仅管理员 OA 账号可查看全部预约记录；<br>首次使用将自动创建账号。</p>
        </div>
    </div>

    <!-- ===== 主应用 ===== -->
    <div id="app">

        <!-- 顶部导航 -->
        <div class="top-header">
            <h1>预约管理</h1>
            <span class="admin-badge">管理端</span>
        </div>

        <!-- 已登录状态条 -->
        <div class="logged-bar" id="loggedBar" style="display:none;">
            <span id="loggedOA">已登录</span>
            <span class="logout-btn" onclick="handleLogout()">退出</span>
        </div>

        <!-- Tab 切换 -->
        <div class="tab-switch" id="tabSwitch" style="display:none;">
            <div class="tab-pill active" data-tab="pending" onclick="switchTab('pending')">未处理</div>
            <div class="tab-pill" data-tab="processed" onclick="switchTab('processed')">已处理</div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <!-- 内容区 -->
        <div class="main-content">

            <!-- 统计 -->
            <div class="stat-bar" id="statBar" style="display:none;">
                <div class="stat-item active" data-filter="all" onclick="setFilter('all', this)">
                    <span class="stat-num" id="statAll">0</span>
                    <span class="stat-label">全部</span>
                </div>
                <div class="stat-item" data-filter="pending" onclick="setFilter('pending', this)">
                    <span class="stat-num" id="statPending">0</span>
                    <span class="stat-label">待处理</span>
                </div>
                <div class="stat-item" data-filter="confirmed" onclick="setFilter('confirmed', this)">
                    <span class="stat-num" id="statConfirmed">0</span>
                    <span class="stat-label">已确认</span>
                </div>
                <div class="stat-item" data-filter="rejected" onclick="setFilter('rejected', this)">
                    <span class="stat-num" id="statRejected">0</span>
                    <span class="stat-label">已拒绝</span>
                </div>
            </div>

            <!-- 记录列表 -->
            <div id="recordsList"></div>
            <div class="empty-state" id="emptyState">暂无记录</div>

        </div><!-- /.main-content -->

    </div><!-- /#app -->

    </div><!-- /.app-shell -->

    <!-- ===== 详情弹窗 ===== -->
    <div class="detail-overlay" id="detailModal">
        <div class="detail-sheet">
            <div class="detail-title">
                <span class="back" onclick="closeDetail()">‹ 返回</span>
                预约详情
            </div>
            <div id="detailContent"></div>

            <!-- 拒绝原因输入区（点拒绝时显示） -->
            <div id="reasonWrap" style="display:none;">
                <div class="reason-label">请填写拒绝原因</div>
                <textarea class="reason-input" id="reasonInput" placeholder="例如：当天名额已满，请改约其他时间"></textarea>
                <div class="reason-hint" id="reasonHint"></div>
            </div>

            <!-- 操作按钮区 -->
            <div class="detail-actions" id="detailActions"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="db.js"></script>
    <script>
        // ==================== 数据 ====================
        let reservations = [];
        let filter = 'all';
        let currentTab = 'pending';

        // ==================== 工具 ====================
        function oaFromEmail(email) {
            if (!email) return '';
            return email.split('@')[0];
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (type ? ' ' + type : '') + ' show';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ==================== 登录 ====================
        function showLogin() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('app').style.display = 'none';
        }

        function enterApp(session) {
            const oa = oaFromEmail(session && session.user && session.user.email);
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loggedBar').style.display = 'flex';
            document.getElementById('tabSwitch').style.display = 'flex';
            document.getElementById('statBar').style.display = 'flex';
            document.getElementById('loggedOA').textContent = '已登录：' + oa;

            loadReservations().then(() => { updateStats(); renderRecords(); });
            DB.subscribe(() => {
                loadReservations().then(() => { updateStats(); renderRecords(); });
            });
        }

        function showLoginHint(msg) {
            document.getElementById('loginHint').textContent = msg || '';
        }

        async function handleLogin() {
            const oa = document.getElementById('loginOA').value.trim();
            const pwd = document.getElementById('loginPwd').value;
            showLoginHint('');
            if (!oa) { showLoginHint('请输入 OA 账号'); return; }
            if (pwd.length < 6) { showLoginHint('密码至少 6 位'); return; }
            let session = null;
            const btn = document.getElementById('loginBtn');
            btn.textContent = '处理中...';
            try {
                const r = await DB.signIn(oa, pwd);
                session = r.session || (r.data && r.data.session);
            } catch (e) {
                try {
                    const r2 = await DB.signUp(oa, pwd);
                    session = r2.session || (r2.data && r2.session);
                    if (!session) {
                        btn.textContent = '登录 / 注册';
                        showLoginHint('账号已创建，但需验证邮箱才能登录。请到 Supabase 关闭"邮箱验证"后重试。');
                        return;
                    }
                } catch (e2) {
                    btn.textContent = '登录 / 注册';
                    showLoginHint('操作失败：' + (e2.message || e2));
                    return;
                }
            }
            btn.textContent = '登录 / 注册';
            if (session) enterApp(session);
        }

        async function handleLogout() {
            await DB.signOut();
            reservations = [];
            showLogin();
        }

        async function loadReservations() {
            try {
                reservations = await DB.list();
            } catch (e) {
                reservations = [];
                showToast('加载失败：' + (e.message || e), 'error');
            }
        }

        async function init() {
            try {
                await DB.init();
            } catch (e) {
                showToast('未连接到云端，请在 config.js 填入 Supabase 密钥', 'error');
                return;
            }
            const session = await DB.getSession();
            if (session) enterApp(session);
            else showLogin();
            DB.onAuthChange((s) => { if (!s) showLogin(); });
        }

        // ==================== Tab 切换（未处理 / 已处理）====================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-pill').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab-pill[data-tab="${tab}"]`).classList.add('active');

            // 切 tab 时自动切换过滤
            if (tab === 'pending') setFilter('pending', null, true);
            else setFilter('confirmed', null, true);

            document.querySelector('.main-content').scrollTop = 0;
        }

        // ==================== 统计与过滤 ====================
        function updateStats() {
            document.getElementById('statAll').textContent = reservations.length;
            document.getElementById('statPending').textContent = reservations.filter(r => r.status === 'pending').length;
            document.getElementById('statConfirmed').textContent = reservations.filter(r => r.status === 'confirmed').length;
            document.getElementById('statRejected').textContent = reservations.filter(r => r.status === 'rejected').length;
        }

        function setFilter(f, el, skipPillUpdate) {
            filter = f;
            if (el) {
                document.querySelectorAll('#statBar .stat-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
            }
            renderRecords();
        }

        // ==================== 渲染记录 ====================
        function renderRecords() {
            const container = document.getElementById('recordsList');
            const emptyState = document.getElementById('emptyState');
            let filtered = reservations;

            if (filter === 'pending') filtered = reservations.filter(r => r.status === 'pending');
            else if (filter === 'confirmed') filtered = reservations.filter(r => r.status === 'confirmed');
            else if (filter === 'rejected') filtered = reservations.filter(r => r.status === 'rejected');

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            container.innerHTML = filtered.map(r => {
                const sm = {
                    pending:   { cls:'', tag:'st-pending',   text:'待处理' },
                    confirmed: { cls:'status-confirmed', tag:'st-confirmed', text:'已确认' },
                    rejected:  { cls:'status-rejected', tag:'st-rejected',  text:'已拒绝' },
                    cancelled: { cls:'', tag:'st-cancelled', text:'已取消' }
                };
                const s = sm[r.status] || sm.pending;
                const actionText = r.status === 'pending' ? '去处理' : '查看详情';
                return `
            <div class="record-card ${s.cls}" onclick="openDetail('${r.id}')">
              <div class="rc-head">
                <span class="rc-type">${r.bizType}</span>
                <span class="rc-status ${s.tag}">${s.text}</span>
              </div>
              <div class="rc-detail"><span>申请人：${r.oaAccount}</span></div>
              <div class="rc-detail"><span>时间：${r.date} ${r.time}</span></div>
              <div class="rc-more">
                <span>${actionText}</span>
                <span class="arrow">›</span>
              </div>
            </div>`;
            }).join('');
        }

        // ==================== 详情弹窗 ====================
        let currentDetailId = null;
        let detailRejectMode = false;

        function openDetail(id) {
            const r = reservations.find(x => x.id === id);
            if (!r) return;
            currentDetailId = id;
            detailRejectMode = false;
            document.getElementById('reasonWrap').style.display = 'none';
            document.getElementById('reasonInput').value = '';
            document.getElementById('reasonHint').textContent = '';
            renderDetail(r);
            document.getElementById('detailModal').classList.add('show');
        }

        function renderDetail(r) {
            const sm = {
                pending:   { tag:'st-pending',   text:'待处理' },
                confirmed: { tag:'st-confirmed', text:'已确认' },
                rejected:  { cls:'status-rejected', tag:'st-rejected',  text:'已拒绝' },
                cancelled: { tag:'st-cancelled', text:'已取消' }
            };
            const s = sm[r.status] || sm.pending;
            const detail = document.getElementById('detailContent');
            detail.innerHTML = `
              <div class="detail-row"><span class="k">业务类型</span><span class="v">${r.bizType}</span></div>
              <div class="detail-row"><span class="k">申请人</span><span class="v">${r.oaAccount}</span></div>
              <div class="detail-row"><span class="k">预约地点</span><span class="v">${r.location}</span></div>
              <div class="detail-row"><span class="k">预约日期</span><span class="v">${r.date}</span></div>
              <div class="detail-row"><span class="k">预约时间</span><span class="v">${r.time}</span></div>
              <div class="detail-row"><span class="k">当前状态</span><span class="v"><span class="rc-status ${s.tag}">${s.text}</span></span></div>
              <div class="detail-row"><span class="k">提交时间</span><span class="v">${new Date(r.createdAt).toLocaleString('zh-CN')}</span></div>
              ${r.status === 'rejected' && r.rejectReason ? `<div class="detail-reason-box"><span class="rh">拒绝原因</span>${r.rejectReason}</div>` : ''}
            `;

            const actions = document.getElementById('detailActions');
            if (r.status === 'pending') {
                actions.innerHTML = `
                  <button class="btn-action btn-confirm" onclick="confirmReservation('${r.id}')">确认预约</button>
                  <button class="btn-action btn-reject" onclick="showRejectForm()">拒绝预约</button>`;
            } else if (r.status === 'confirmed') {
                actions.innerHTML = `
                  <button class="btn-action btn-reject" onclick="showRejectForm()">拒绝预约</button>`;
            } else if (r.status === 'rejected') {
                actions.innerHTML = `
                  <button class="btn-action btn-confirm" onclick="confirmReservation('${r.id}')">改为确认</button>`;
            } else {
                actions.innerHTML = '';
            }
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('show');
            detailRejectMode = false;
        }

        function showRejectForm() {
            detailRejectMode = true;
            document.getElementById('reasonWrap').style.display = 'block';
            // 非 pending 时把确认按钮隐藏，只留提交拒绝
            const actions = document.getElementById('detailActions');
            actions.innerHTML = `<button class="btn-action btn-reject" onclick="submitReject()">提交拒绝</button>`;
            document.getElementById('reasonInput').focus();
        }

        async function submitReject() {
            const reason = document.getElementById('reasonInput').value.trim();
            if (!reason) {
                document.getElementById('reasonHint').textContent = '请填写拒绝原因';
                return;
            }
            if (!currentDetailId) return;
            try {
                await DB.update(currentDetailId, 'rejected', reason);
                showToast('预约已拒绝', 'error');
                detailRejectMode = false;
                closeDetail();
                loadReservations().then(() => { updateStats(); renderRecords(); });
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        async function confirmReservation(id) {
            try {
                await DB.update(id, 'confirmed');
                showToast('预约已确认', 'success');
                closeDetail();
                loadReservations().then(() => { updateStats(); renderRecords(); });
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        async function rejectReservation(id) {
            if (detailRejectMode) { submitReject(); return; }
            try {
                await DB.update(id, 'rejected');
                showToast('预约已拒绝', 'error');
                closeDetail();
                loadReservations().then(() => { updateStats(); renderRecords(); });
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

        init();
    </script>
</body>
</html>
