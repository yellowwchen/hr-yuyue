<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR 业务预约系统</title>
    <style>
        :root {
            --primary: #4F6EF7;
            --primary-dark: #3A54DB;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-light: #999;
            --border: #E8ECF1;
            --success: #00B894;
            --danger: #E17055;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --radius: 14px;
            --radius-xs: 8px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #E8ECF1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: var(--bg);
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2), 0 0 0 3px #1a1a1a, 0 0 0 6px #2d2d2d;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: #FFFFFF;
            padding: 14px 28px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
            flex-shrink: 0;
        }
        .status-bar .time {
            font-size: 14px;
            font-weight: 700;
        }

        .notch-bar {
            display: flex;
            justify-content: center;
            padding: 0 0 4px;
            background: #FFFFFF;
            flex-shrink: 0;
        }
        .notch {
            width: 100px;
            height: 28px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .nav-header {
            background: #FFFFFF;
            padding: 12px 20px 14px;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-content::-webkit-scrollbar {
            width: 0;
        }

        .tab-switch {
            display: flex;
            background: #EEF1F6;
            border-radius: 22px;
            padding: 4px;
            margin: 0 16px 18px;
            flex-shrink: 0;
        }
        .tab-switch .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 16px;
            border-radius: 19px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .tab-switch .tab-item.active {
            background: #FFFFFF;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.15);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .card-header {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .card-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 4px;
        }
        .card-header p {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-label .required {
            color: var(--danger);
            font-weight: 700;
        }
        .form-input,
        .form-picker {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 15px;
            color: var(--text);
            background: #FAFBFC;
            transition: var(--transition);
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .form-input:focus {
            border-color: var(--primary);
            background: #FFF;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.06);
        }
        .form-picker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 12px;
        }
        .form-picker .placeholder {
            color: #B0B8C1;
        }
        .form-picker .arrow {
            font-size: 12px;
            color: #B0B8C1;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            width: 100%;
            text-align: center;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: #FFF;
            box-shadow: 0 6px 18px rgba(79, 110, 247, 0.25);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-outline {
            background: #FFF;
            color: var(--primary);
            border: 2px solid var(--primary);
            font-weight: 600;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 16px;
            width: auto;
            font-weight: 600;
        }
        .btn-disabled {
            background: #D5DAE0;
            color: #FFF;
            cursor: not-allowed;
            pointer-events: none;
        }

        .record-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .record-card.status-confirmed {
            border-left-color: var(--success);
        }
        .record-card.status-rejected {
            border-left-color: var(--danger);
        }
        .record-card .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .record-card .record-type {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }
        .record-card .record-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .status-pending {
            background: #FFF8E7;
            color: #C79100;
        }
        .status-confirmed {
            background: #E6FAF3;
            color: #00875A;
        }
        .status-rejected-tag {
            background: #FFEEEA;
            color: #D63031;
        }
        .record-card .record-detail {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .record-card .record-detail span {
            display: inline-block;
            margin-right: 14px;
        }
        .record-card .record-time {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2D3436;
            color: #FFF;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 50;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-sheet {
            background: #FFF;
            border-radius: 18px 18px 0 0;
            padding: 24px 20px 30px;
            width: 100%;
            max-height: 60%;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-sheet {
            transform: translateY(0);
        }
        .modal-sheet h4 {
            text-align: center;
            font-size: 16px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .modal-sheet .option-item {
            padding: 13px 16px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 15px;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text);
            font-weight: 500;
            transition: var(--transition);
        }
        .modal-sheet .option-item:hover {
            background: #F5F7FA;
        }
        .modal-sheet .option-item.selected {
            background: #EEF2FF;
            color: var(--primary);
            font-weight: 700;
        }
        .modal-cancel {
            display: block;
            width: 100%;
            padding: 13px;
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 20px;
            margin-top: 8px;
            background: #F5F7FA;
            border: none;
            font-size: 15px;
            font-family: inherit;
        }

        @media (max-width: 440px) {
            .phone-frame {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            body {
                padding: 0;
            }
        }

        /* ===== 登录层 ===== */
        .login-view {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #4F6EF7 0%, #3A54DB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .login-view.hidden { display: none; }
        .login-card {
            background: #fff;
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            padding: 32px 26px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
        }
        .login-card h2 { font-size: 20px; color: var(--text); margin: 0 0 6px; }
        .login-card .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 22px; }
        .login-card .form-input { margin-bottom: 14px; text-align: center; }
        .login-card .btn { margin-top: 6px; }
        .login-hint {
            font-size: 12.5px;
            color: var(--danger);
            min-height: 18px;
            margin: 4px 0 10px;
        }
        .login-tip { font-size: 11.5px; color: #B0B8C1; margin-top: 14px; line-height: 1.5; }
        .logged-bar {
            background: #EEF2FF;
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            flex-shrink: 0;
        }
        .logged-bar .logout { color: var(--danger); cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <!-- 登录层（未登录时显示） -->
    <div class="login-view" id="loginView">
        <div class="login-card">
            <h2>HR 业务预约系统</h2>
            <p class="sub">请使用 OA 账号登录</p>
            <input type="text" class="form-input" id="loginOA" placeholder="OA账号" maxlength="40" autocomplete="username">
            <input type="password" class="form-input" id="loginPwd" placeholder="密码（至少6位）" autocomplete="current-password">
            <div class="login-hint" id="loginHint"></div>
            <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">登录 / 注册</button>
            <p class="login-tip">首次使用将自动为您创建账号并设置密码；<br>登录后只能看到您本人的预约记录。</p>
        </div>
    </div>

    <div class="phone-frame" id="app" style="display:none;">
        <div class="status-bar">
            <span class="time">9:41</span>
            <span>5G ▮▮▮▮ 🔋</span>
        </div>
        <div class="notch-bar"><div class="notch"></div></div>
        <div class="nav-header">HR 业务预约系统</div>
        <div class="logged-bar">
            <span id="loggedOA">已登录</span>
            <span class="logout" onclick="handleLogout()">退出</span>
        </div>

        <div class="tab-switch" id="tabSwitch">
            <div class="tab-item active" data-tab="form" onclick="switchTab('form')">预约申请</div>
            <div class="tab-item" data-tab="records" onclick="switchTab('records')">预约记录</div>
        </div>

        <div class="toast" id="toast"></div>

        <div class="scroll-content" id="scrollContent">
            <!-- 表单 -->
            <div id="formView">
                <div class="card">
                    <div class="card-header">
                        <h3>新建预约</h3>
                        <p>请填写以下信息完成预约</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">申请人OA账号 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="oaAccount" placeholder="请输入您的OA账号" maxlength="30" oninput="validateForm()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">预约业务类型 <span class="required">*</span></label>
                        <div class="form-picker" id="bizTypePicker" onclick="openPicker('bizType')">
                            <span class="placeholder" id="bizTypeText">请选择业务类型</span>
                            <span class="arrow">▾</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">预约地点 <span class="required">*</span></label>
                        <div class="form-picker" id="locationPicker" onclick="openPicker('location')">
                            <span class="placeholder" id="locationText">请选择预约地点</span>
                            <span class="arrow">▾</span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">预约日期 <span class="required">*</span></label>
                            <div class="form-picker" id="datePicker" onclick="openDatePicker()">
                                <span class="placeholder" id="dateText">请选择日期</span>
                                <span class="arrow">▾</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">预约时间 <span class="required">*</span></label>
                            <div class="form-picker" id="timePicker" onclick="openTimePicker()">
                                <span class="placeholder" id="timeText">请选择时间</span>
                                <span class="arrow">▾</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-disabled" id="submitBtn" onclick="submitForm()">确认提交预约</button>
                <p style="text-align:center;font-size:11px;color:#B0B8C1;margin-top:10px;">提交后HR将会尽快处理</p>
            </div>

            <!-- 记录 -->
            <div id="recordsView" style="display:none;">
                <div id="recordsList"></div>
                <div class="empty-state" id="emptyState">暂无预约记录</div>
            </div>
        </div>

        <!-- 弹窗 -->
        <div class="modal-overlay" id="pickerModal">
            <div class="modal-sheet">
                <h4 id="pickerTitle">请选择</h4>
                <div id="pickerOptions"></div>
                <button class="modal-cancel" onclick="closePicker()">取消</button>
            </div>
        </div>
        <div class="modal-overlay" id="dateModal">
            <div class="modal-sheet">
                <h4>选择预约日期</h4>
                <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;" id="dateOptions"></div>
                <button class="modal-cancel" onclick="closeDatePicker()">取消</button>
            </div>
        </div>
        <div class="modal-overlay" id="timeModal">
            <div class="modal-sheet">
                <h4>选择预约时间</h4>
                <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;" id="timeOptions"></div>
                <button class="modal-cancel" onclick="closeTimePicker()">取消</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="db.js"></script>
    <script>
        // ==================== 数据来源：云端 Supabase（与管理端实时共享） ====================
        const LAST_OA_KEY = 'hr_last_oa';

        const bizTypes = [
            '入职办理', '离职办理', '社保公积金咨询', '劳动合同签订',
            '薪资咨询', '档案查询', '考勤异常处理', '培训报名',
            '绩效申诉', '福利申请', '工牌补办', '其他'
        ];

        const locations = [
            '总部HR办公室（A栋3楼）',
            '总部HR办公室（B栋5楼）',
            '分公司HR办公室（南山）',
            '分公司HR办公室（福田）',
            '线上视频会议',
            '电话沟通'
        ];

        let reservations = [];
        let formData = { oaAccount: '', bizType: '', location: '', date: '', time: '' };
        let currentPickerType = '';

        // ==================== 初始化 ====================
        async function loadReservations() {
            try {
                reservations = await DB.list();
            } catch (e) {
                reservations = [];
                showToast('加载失败：' + (e.message || e), 'error');
            }
        }

        function saveReservations() {
            // 数据由云端持久化，前端不再写入本地
        }

        // ==================== 登录 / 鉴权 ====================
        function oaFromEmail(email) {
            if (!email) return '';
            return email.split('@')[0];
        }

        function showLogin() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('app').style.display = 'none';
        }

        function enterApp(session) {
            const oa = oaFromEmail(session && session.user && session.user.email);
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loggedOA').textContent = '已登录：' + oa;
            // 锁定 OA 账号输入（身份由登录决定，不可改）
            const oaInput = document.getElementById('oaAccount');
            oaInput.value = oa;
            oaInput.disabled = true;
            oaInput.style.background = '#F0F0F0';
            oaInput.style.color = '#888';
            formData.oaAccount = oa;
            updateSubmitButton();
            // 首次拉取云端数据（RLS 自动只返回本人的）
            loadReservations().then(() => {
                if (document.getElementById('recordsView').style.display !== 'none') renderRecords();
            });
            // 实时监听云端变更
            DB.subscribe(() => {
                loadReservations().then(() => {
                    if (document.getElementById('recordsView').style.display !== 'none') renderRecords();
                });
            });
        }

        function showLoginHint(msg) {
            document.getElementById('loginHint').textContent = msg || '';
        }

        async function handleLogin() {
            const oa = document.getElementById('loginOA').value.trim();
            const pwd = document.getElementById('loginPwd').value;
            showLoginHint('');
            if (!oa) { showLoginHint('请输入 OA 账号'); return; }
            if (pwd.length < 6) { showLoginHint('密码至少 6 位'); return; }
            let session = null;
            const btn = document.getElementById('loginBtn');
            btn.textContent = '处理中...';
            try {
                const r = await DB.signIn(oa, pwd);
                session = r.session || (r.data && r.data.session);
            } catch (e) {
                // 登录失败 → 可能是首次使用，自动注册
                try {
                    const r2 = await DB.signUp(oa, pwd);
                    session = r2.session || (r2.data && r2.data.session);
                    if (!session) {
                        btn.textContent = '登录 / 注册';
                        showLoginHint('账号已创建，但需验证邮箱才能登录。请到 Supabase 关闭“邮箱验证”后重试。');
                        return;
                    }
                } catch (e2) {
                    btn.textContent = '登录 / 注册';
                    showLoginHint('操作失败：' + (e2.message || e2));
                    return;
                }
            }
            btn.textContent = '登录 / 注册';
            if (session) enterApp(session);
        }

        async function handleLogout() {
            await DB.signOut();
            document.getElementById('oaAccount').disabled = false;
            document.getElementById('oaAccount').style.background = '';
            document.getElementById('oaAccount').style.color = '';
            formData = { oaAccount: '', bizType: '', location: '', date: '', time: '' };
            reservations = [];
            showLogin();
        }

        async function init() {
            renderDateOptions();
            renderTimeOptions();
            updateSubmitButton();
            try {
                await DB.init();
            } catch (e) {
                showToast('未连接到云端，请在 config.js 填入 Supabase 密钥', 'error');
                return;
            }
            // 已有会话则直接进入，否则显示登录
            const session = await DB.getSession();
            if (session) {
                enterApp(session);
            } else {
                showLogin();
            }
            // 登录态变化（如 token 刷新）同步
            DB.onAuthChange((s) => {
                if (!s) showLogin();
            });
        }

        // ==================== Tab切换 ====================
        function switchTab(tab) {
            document.querySelectorAll('#tabSwitch .tab-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`#tabSwitch .tab-item[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('formView').style.display = tab === 'form' ? 'block' : 'none';
            document.getElementById('recordsView').style.display = tab === 'records' ? 'block' : 'none';
            if (tab === 'records') {
                loadReservations();
                renderRecords();
            }
            document.getElementById('scrollContent').scrollTop = 0;
        }

        // ==================== 选择器 ====================
        function openPicker(type) {
            currentPickerType = type;
            const options = type === 'bizType' ? bizTypes : locations;
            const currentVal = type === 'bizType' ? formData.bizType : formData.location;
            document.getElementById('pickerTitle').textContent = type === 'bizType' ? '选择业务类型' : '选择预约地点';
            document.getElementById('pickerOptions').innerHTML = options.map(opt =>
                `<div class="option-item ${opt === currentVal ? 'selected' : ''}" onclick="selectPickerOption('${opt.replace(/'/g, "\\'")}')">${opt}</div>`
            ).join('');
            document.getElementById('pickerModal').classList.add('show');
        }

        function selectPickerOption(value) {
            if (currentPickerType === 'bizType') {
                formData.bizType = value;
                document.getElementById('bizTypeText').textContent = value;
                document.getElementById('bizTypeText').classList.remove('placeholder');
            } else {
                formData.location = value;
                document.getElementById('locationText').textContent = value;
                document.getElementById('locationText').classList.remove('placeholder');
            }
            closePicker();
            updateSubmitButton();
        }

        function closePicker() {
            document.getElementById('pickerModal').classList.remove('show');
        }

        // ==================== 日期 ====================
        function renderDateOptions() {
            const container = document.getElementById('dateOptions');
            const today = new Date();
            let html = '';
            for (let i = 0; i < 14; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = formatDate(d);
                const dayName = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
                html += `<div class="option-item ${formData.date === dateStr ? 'selected' : ''}" onclick="selectDate('${dateStr}')" style="min-width:70px;padding:12px 10px;font-size:13px;text-align:center;">
              <div style="font-weight:700;">${dateStr.split('-').slice(1).join('/')}</div>
              <div style="font-size:11px;color:#888;">${dayName}</div>
            </div>`;
            }
            container.innerHTML = html;
        }

        function openDatePicker() {
            renderDateOptions();
            document.getElementById('dateModal').classList.add('show');
        }

        function selectDate(dateStr) {
            formData.date = dateStr;
            document.getElementById('dateText').textContent = dateStr;
            document.getElementById('dateText').classList.remove('placeholder');
            closeDatePicker();
            updateSubmitButton();
        }

        function closeDatePicker() { document.getElementById('dateModal').classList.remove('show'); }

        function formatDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ==================== 时间 ====================
        function renderTimeOptions() {
            const times = [];
            for (let h = 9; h <= 18; h++)
                for (let m = 0; m < 60; m += 30)
                    if (!(h === 18 && m > 0)) times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
            document.getElementById('timeOptions').innerHTML = times.map(t =>
                `<div class="option-item ${formData.time === t ? 'selected' : ''}" onclick="selectTime('${t}')" style="min-width:65px;padding:12px 14px;font-size:14px;text-align:center;">${t}</div>`
            ).join('');
        }

        function openTimePicker() {
            renderTimeOptions();
            document.getElementById('timeModal').classList.add('show');
        }

        function selectTime(timeStr) {
            formData.time = timeStr;
            document.getElementById('timeText').textContent = timeStr;
            document.getElementById('timeText').classList.remove('placeholder');
            closeTimePicker();
            updateSubmitButton();
        }

        function closeTimePicker() { document.getElementById('timeModal').classList.remove('show'); }

        // ==================== 表单 ====================
        function validateForm() {
            formData.oaAccount = document.getElementById('oaAccount').value.trim();
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            const valid = formData.oaAccount && formData.bizType && formData.location && formData.date && formData
            .time;
            btn.classList.toggle('btn-disabled', !valid);
            btn.textContent = valid ? '确认提交预约' : '请完整填写表单';
        }

        async function submitForm() {
            if (!formData.oaAccount || !formData.bizType || !formData.location || !formData.date || !formData.time) {
                showToast('请完整填写所有字段', 'error');
                return;
            }
            if (new Date(formData.date + 'T' + formData.time) < new Date()) {
                showToast('预约时间不能早于当前时间', 'error');
                return;
            }
            const payload = {
                oaAccount: formData.oaAccount,
                bizType: formData.bizType,
                location: formData.location,
                date: formData.date,
                time: formData.time
            };
            try {
                await DB.create(payload);
                localStorage.setItem(LAST_OA_KEY, formData.oaAccount);
                resetForm();
                showToast('预约提交成功', 'success');
                switchTab('records');
                loadReservations().then(renderRecords);
            } catch (e) {
                showToast('提交失败：' + (e.message || e), 'error');
            }
        }

        function resetForm() {
            formData = { oaAccount: '', bizType: '', location: '', date: '', time: '' };
            document.getElementById('oaAccount').value = '';
            ['bizTypeText', 'locationText', 'dateText', 'timeText'].forEach(id => {
                const el = document.getElementById(id);
                el.textContent = id === 'bizTypeText' ? '请选择业务类型' : id === 'locationText' ? '请选择预约地点' :
                    id === 'dateText' ? '请选择日期' : '请选择时间';
                el.classList.add('placeholder');
            });
            updateSubmitButton();
        }

        // ==================== 记录 ====================
        function renderRecords() {
            const container = document.getElementById('recordsList');
            const emptyState = document.getElementById('emptyState');
            if (reservations.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            container.innerHTML = reservations.map(r => {
                const statusMap = {
                    pending: { cls: '', tag: 'status-pending', text: '待确认' },
                    confirmed: { cls: 'status-confirmed', tag: 'status-confirmed', text: '已确认' },
                    rejected: { cls: 'status-rejected', tag: 'status-rejected-tag', text: '已拒绝' },
                    cancelled: { cls: '', tag: '', text: '已取消' }
                };
                const s = statusMap[r.status] || statusMap.pending;
                return `
            <div class="record-card ${s.cls}">
              <div class="record-header">
                <span class="record-type">${r.bizType}</span>
                <span class="record-status ${s.tag}">${s.text}</span>
              </div>
              <div class="record-detail"><span>${r.oaAccount}</span><span>${r.location}</span></div>
              <div class="record-detail"><span>${r.date}</span><span>${r.time}</span></div>
              <div class="record-time">提交于 ${new Date(r.createdAt).toLocaleString('zh-CN')}</div>
              ${r.status === 'pending' ? `<button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="cancelReservation('${r.id}')">取消预约</button>` : ''}
            </div>`;
            }).join('');
        }

        async function cancelReservation(id) {
            try {
                await DB.update(id, 'cancelled');
                showToast('预约已取消', 'error');
                loadReservations().then(renderRecords);
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        // ==================== Toast ====================
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 弹窗关闭 ====================
        document.getElementById('pickerModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                closePicker(); });
        document.getElementById('dateModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                closeDatePicker(); });
        document.getElementById('timeModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                closeTimePicker(); });

        document.getElementById('oaAccount').addEventListener('keydown', e => { if (e.key === 'Enter') e.target
                .blur(); });

        init();
    </script>
</body>
</html>
