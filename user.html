<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR 业务预约系统</title>
    <style>
        :root {
            --primary: #2B7DE9;
            --primary-light: #EBF2FF;
            --bg: #F5F8FC;
            --card-bg: #FFFFFF;
            --text: #1A1A2E;
            --text-secondary: #6B778C;
            --text-light: #A0ABB8;
            --border: #E4E9F0;
            --required: #E74C3C;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning-orange: #E67E22;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 10px;
            --radius-xs: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg);
            position: relative;
        }

        /* ===== 登录层 ===== */
        .login-view {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #2B7DE9 0%, #1E57A8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
        }
        .login-view.hidden { display: none; }
        .login-card {
            background: #fff;
            width: 100%;
            max-width: 340px;
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
            text-align: center;
        }
        .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .login-card .sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .login-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
            margin-bottom: 14px;
            text-align: center;
        }
        .login-input:focus { border-color: var(--primary); }
        .login-hint {
            font-size: 12.5px;
            color: var(--danger);
            min-height: 18px;
            margin-bottom: 6px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 4px;
        }
        .btn-login:active { opacity: .88; }
        .login-tip { font-size: 11.5px; color: #B0BCC8; margin-top: 16px; line-height: 1.6; }

        /* ===== 主应用容器 ===== */
        #app {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ===== 顶部导航栏 ===== */
        .top-header {
            background: #fff;
            padding: 18px 20px 14px;
            text-align: center;
            flex-shrink: 0;
        }
        .top-header h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ===== 已登录状态条 ===== */
        .logged-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: var(--primary-light);
            font-size: 12.5px;
            font-weight: 600;
            color: var(--primary);
            flex-shrink: 0;
        }
        .logged-bar .logout-btn {
            color: var(--danger);
            font-weight: 600;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ===== 胶囊 Tab 切换 ===== */
        .tab-switch {
            display: flex;
            gap: 0;
            padding: 12px 20px 0;
            flex-shrink: 0;
        }
        .tab-pill {
            flex: 1;
            text-align: center;
            padding: 11px 0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            color: var(--text-secondary);
            background: transparent;
            position: relative;
            transition: color .2s;
        }
        .tab-pill.active {
            color: var(--primary);
            background: #fff;
            box-shadow: 0 -2px 10px rgba(43,125,233,.08);
        }

        /* ===== 内容区 ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 20px 30px;
            background: var(--bg);
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* ===== 表单卡片 ===== */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px 20px 20px;
            margin-top: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.03);
        }
        .form-card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .form-card-sub {
            font-size: 12.5px;
            color: var(--text-secondary);
            margin-bottom: 22px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            display: block;
        }
        .form-label .req {
            color: var(--required);
            margin-left: 2px;
        }
        .form-field {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text);
            background: #FAFBFD;
            outline: none;
            font-family: inherit;
            transition: all .2s;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-field:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(43,125,233,.08);
        }
        .form-field:disabled {
            background: #F0F2F5;
            color: #888;
        }
        .form-picker-wrap {
            position: relative;
        }
        .form-picker-wrap::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            border: 5px solid transparent;
            border-top-color: #B0BCC8;
            pointer-events: none;
        }
        .form-picker-wrap .form-field {
            cursor: pointer;
            padding-right: 36px;
            color: #B0BCC8;
        }
        .form-picker-wrap .form-field.has-value {
            color: var(--text);
        }

        /* ===== 提交按钮 ===== */
        .submit-area {
            padding: 24px 20px 10px;
        }
        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
        }
        .btn-submit.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 20px rgba(43,125,233,.32);
        }
        .btn-submit.active:active { opacity: .88; transform: scale(.99); }
        .btn-submit.disabled {
            background: #D0DAE8;
            color: #fff;
            cursor: not-allowed;
        }
        .submit-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 10px;
        }

        /* ===== 记录卡片 ===== */
        .record-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 18px 18px 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.03);
            border-left: 4px solid var(--primary);
        }
        .record-card.status-confirmed { border-left-color: var(--success); }
        .record-card.status-rejected { border-left-color: var(--danger); }
        .record-card.status-cancelled { border-left-color: var(--text-light); }
        .rc-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rc-type { font-weight: 700; font-size: 15px; }
        .rc-status {
            font-size: 11.5px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
        }
        .st-pending { background: #FFF9ED; color: #D4940A; }
        .st-confirmed { background: #EDFBF4; color: #1D8A52; }
        .st-rejected { background: #FEECEC; color: #D63C31; }
        .st-cancelled { background: #F5F5F5; color: #999; }
        .rc-detail {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .rc-detail span { display: inline-block; margin-right: 14px; }
        .rc-time {
            font-size: 11.5px;
            color: var(--text-light);
            margin-top: 8px;
        }
        .rc-action {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .btn-sm-action {
            padding: 8px 18px;
            border-radius: var(--radius-xs);
            font-size: 12.5px;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
        }
        .btn-sm-danger {
            border-color: #FDD8DC;
            color: var(--danger);
            background: #FEF5F6;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            font-size: 14.5px;
        }

        /* ===== 温馨提示弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 300;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 28px 24px 34px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform .3s cubic-bezier(.32,.72,0,1);
        }
        .modal-overlay.show .modal-sheet { transform: translateY(0); }
        .tip-title {
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
        }
        .tip-body {
            font-size: 14px;
            line-height: 1.75;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }
        .tip-warn-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--warning-orange);
            margin-bottom: 8px;
        }
        .tip-rules {
            font-size: 13.5px;
            line-height: 1.85;
            color: var(--text-secondary);
            padding-left: 2px;
            margin-bottom: 16px;
        }
        .tip-thanks { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .btn-tip-close {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-tip-close:active { opacity: .88; }

        /* ===== 选择器弹窗（底部抽屉） ===== */
        .picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.35);
            z-index: 250;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }
        .picker-overlay.show { opacity: 1; pointer-events: auto; }
        .picker-sheet {
            background: #fff;
            border-radius: 18px 18px 0 0;
            padding: 22px 20px 26px;
            width: 100%;
            max-width: 500px;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform .3s cubic-bezier(.32,.72,0,1);
        }
        .picker-overlay.show .picker-sheet { transform: translateY(0); }
        .picker-sheet h4 {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .picker-opt {
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text);
            font-weight: 500;
            transition: background .15s;
        }
        .picker-opt:hover, .picker-opt:active { background: var(--bg); }
        .picker-opt.selected { background: var(--primary-light); color: var(--primary); font-weight: 700; }
        .picker-cancel-btn {
            display: block;
            width: 100%;
            padding: 13px;
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            background: var(--bg);
            border: none;
            font-size: 15px;
            font-family: inherit;
        }

        /* ===== 日历格子 ===== */
        .cal-day {
            text-align: center;
            padding: 9px 2px;
            font-size: 14px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text);
            transition: all .15s;
        }
        .cal-day:hover { background: var(--primary-light); }
        .cal-day.cal-sel { background: var(--primary); color: #fff; font-weight: 700; }
        .cal-day.cal-today { color: var(--primary); font-weight: 700; }
        .cal-day.cal-sel.cal-today { color: #fff; }
        .cal-day.cal-past { color: #d0d0d0; cursor: default; }
        .cal-day.cal-past:hover { background: transparent; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(26,26,46,.88);
            color: #fff;
            padding: 11px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: all .25s ease;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: rgba(39,174,96,.92); }
        .toast.error { background: rgba(231,76,60,.92); }
    </style>
</head>
<body>

    <!-- ===== 登录层 ===== -->
    <div class="login-view" id="loginView">
        <div class="login-card">
            <h2>HR 业务预约系统</h2>
            <p class="sub">请使用 OA 账号登录</p>
            <input type="text" class="login-input" id="loginOA" placeholder="OA账号" maxlength="40" autocomplete="username">
            <input type="password" class="login-input" id="loginPwd" placeholder="密码（至少6位）" autocomplete="current-password">
            <div class="login-hint" id="loginHint"></div>
            <button class="btn-login" id="loginBtn" onclick="handleLogin()">登录 / 注册</button>
            <p class="login-tip">首次使用将自动为您创建账号并设置密码；<br>登录后只能看到您本人的预约记录。</p>
        </div>
    </div>

    <!-- ===== 主应用外壳（宽度约束） ===== -->
    <div class="app-shell">
    <div id="app">

        <!-- 顶部标题 -->
        <div class="top-header">
            <h1>HR业务预约</h1>
        </div>

        <!-- 已登录状态条 -->
        <div class="logged-bar" id="loggedBar" style="display:none;">
            <span id="loggedOA">已登录</span>
            <span class="logout-btn" onclick="handleLogout()">退出</span>
        </div>

        <!-- Tab 切换 -->
        <div class="tab-switch" id="tabSwitch" style="display:none;">
            <div class="tab-pill active" data-tab="form" onclick="switchTab('form')">新建预约</div>
            <div class="tab-pill" data-tab="records" onclick="switchTab('records')">预约记录</div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <!-- 内容区 -->
        <div class="main-content">

            <!-- === 新建预约 === -->
            <div id="formView">
                <div class="form-card">
                    <div class="form-card-title">新建预约</div>
                    <div class="form-card-sub">请填写以下信息完成预约</div>

                    <div class="form-group">
                        <label class="form-label">申请人OA账号 <span class="req">*</span></label>
                        <input type="text" class="form-field" id="oaAccount" placeholder="" maxlength="30" oninput="validateForm()">
                    </div>

                    <div class="form-group">
                        <label class="form-label">预约业务类型 <span class="req">*</span></label>
                        <div class="form-picker-wrap" onclick="openPicker('bizType')">
                            <input type="text" class="form-field" id="bizTypeText" readonly placeholder="请选择业务类型" onclick="openPicker('bizType')">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">预约地点 <span class="req">*</span></label>
                        <div class="form-picker-wrap" onclick="openPicker('location')">
                            <input type="text" class="form-field" id="locationText" readonly placeholder="请选择预约地点" onclick="openPicker('location')">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">预约日期 <span class="req">*</span></label>
                        <div class="form-picker-wrap" onclick="openDatePicker()">
                            <input type="text" class="form-field" id="dateText" readonly placeholder="请选择日期" onclick="openDatePicker()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">预约时间 <span class="req">*</span></label>
                        <div class="form-picker-wrap" onclick="openTimePicker()">
                            <input type="text" class="form-field" id="timeText" readonly placeholder="请选择时间" onclick="openTimePicker()">
                        </div>
                    </div>
                </div>

                <div class="submit-area">
                    <button class="btn-submit disabled" id="submitBtn" onclick="submitForm()">请完整填写表单</button>
                    <p class="submit-note">提交后HR将会尽快处理</p>
                </div>
            </div>

            <!-- === 预约记录 === -->
            <div id="recordsView" style="display:none;">
                <div id="recordsList"></div>
                <div class="empty-state" id="emptyState">暂无预约记录</div>
            </div>

        </div><!-- /.main-content -->

    </div><!-- /#app -->
    </div><!-- /.app-shell -->

    <!-- ===== 温馨提示弹窗 ===== -->
    <div class="modal-overlay" id="tipModal">
        <div class="modal-sheet">
            <div class="tip-title">温馨提示</div>
            <div class="tip-body">欢迎使用HR智能业务预约系统。您可根据自身需求，自助选择业务办理时间。</div>
            <div class="tip-warn-label">请注意：</div>
            <div class="tip-rules">
                1. 单个预约申请只对应一项业务；<br>
                2. 每日可预约总量为5人次，额满即止；<br>
                3. 预约提交后，须经管理员审核确认，确认后方视为有效预约。
            </div>
            <div class="tip-thanks">感谢您的理解与配合！</div>
            <button class="btn-tip-close" onclick="closeTipModal()">我知道了</button>
        </div>
    </div>

    <!-- ===== 选择器弹窗 ===== -->
    <div class="picker-overlay" id="pickerModal">
        <div class="picker-sheet">
            <h4 id="pickerTitle">请选择</h4>
            <div id="pickerOptions"></div>
            <button class="picker-cancel-btn" onclick="closePicker()">取消</button>
        </div>
    </div>
    <!-- ===== 日历选择弹窗 ===== -->
    <div class="picker-overlay" id="dateModal">
        <div class="picker-sheet picker-sheet-calendar" style="padding:20px 16px 26px;">
            <h4 style="margin-bottom:12px;">选择预约日期</h4>
            <!-- 日历头部 -->
            <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;">
                <button onclick="calMonth(-1)" style="border:none;background:none;font-size:18px;cursor:pointer;color:#666;padding:4px;">&laquo;</button>
                <span id="calTitle" style="font-size:15px;font-weight:700;min-width:140px;text-align:center;"></span>
                <button onclick="calMonth(1)" style="border:none;background:none;font-size:18px;cursor:pointer;color:#666;padding:4px;">&raquo;</button>
            </div>
            <!-- 星期头 -->
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">日</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">一</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">二</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">三</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">四</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">五</div>
                <div style="text-align:center;font-size:12px;color:#999;font-weight:600;">六</div>
            </div>
            <!-- 日期格子 -->
            <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;"></div>
            <button class="picker-cancel-btn" onclick="closeDatePicker()" style="margin-top:14px;">取消</button>
        </div>
    </div>
    <div class="picker-overlay" id="timeModal">
        <div class="picker-sheet">
            <h4>选择预约时间</h4>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;" id="timeOptions"></div>
            <button class="picker-cancel-btn" onclick="closeTimePicker()">取消</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="db.js"></script>
    <script>
        // ==================== 数据 ====================
        const LAST_OA_KEY = 'hr_last_oa';
        const TIP_SHOWN_KEY = 'hr_tip_shown_v2';

        const bizTypes = [
            '入职办理', '离职办理', '证明业务办理', '户政业务办理',
            '社保公积金咨询', '福利政策咨询', '文件签订'
        ];

        const locations = [
            '深圳', '北京', '上海', '广州'
        ];

        let reservations = [];
        let formData = { oaAccount: '', bizType: '', location: '', date: '', time: '' };
        let currentPickerType = '';

        // ==================== 工具 ====================
        function oaFromEmail(email) {
            if (!email) return '';
            return email.split('@')[0];
        }

        // ==================== Toast ====================
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (type ? ' ' + type : '') + ' show';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ==================== 登录 ====================
        function showLogin() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('app').style.display = 'none';
        }

        function enterApp(session) {
            const oa = oaFromEmail(session && session.user && session.user.email);
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loggedBar').style.display = 'flex';
            document.getElementById('tabSwitch').style.display = 'flex';
            document.getElementById('loggedOA').textContent = '已登录：' + oa;

            // 锁定 OA
            const oaInput = document.getElementById('oaAccount');
            oaInput.value = oa;
            oaInput.disabled = true;
            formData.oaAccount = oa;
            updateSubmitButton();

            // 拉数据
            loadReservations().then(() => {
                if (document.getElementById('recordsView').style.display !== 'none') renderRecords();
            });
            DB.subscribe(() => {
                loadReservations().then(() => {
                    if (document.getElementById('recordsView').style.display !== 'none') renderRecords();
                });
            });

            // 首次进入显示温馨提示
            if (!localStorage.getItem(TIP_SHOWN_KEY)) {
                setTimeout(() => { document.getElementById('tipModal').classList.add('show'); }, 400);
            }
        }

        function showLoginHint(msg) {
            document.getElementById('loginHint').textContent = msg || '';
        }

        async function handleLogin() {
            const oa = document.getElementById('loginOA').value.trim();
            const pwd = document.getElementById('loginPwd').value;
            showLoginHint('');
            if (!oa) { showLoginHint('请输入 OA 账号'); return; }
            if (pwd.length < 6) { showLoginHint('密码至少 6 位'); return; }
            let session = null;
            const btn = document.getElementById('loginBtn');
            btn.textContent = '处理中...';
            try {
                const r = await DB.signIn(oa, pwd);
                session = r.session || (r.data && r.data.session);
            } catch (e) {
                try {
                    const r2 = await DB.signUp(oa, pwd);
                    session = r2.session || (r2.data && r2.session);
                    if (!session) {
                        btn.textContent = '登录 / 注册';
                        showLoginHint('账号已创建，但需验证邮箱才能登录。请到 Supabase 关闭"邮箱验证"后重试。');
                        return;
                    }
                } catch (e2) {
                    btn.textContent = '登录 / 注册';
                    showLoginHint('操作失败：' + (e2.message || e2));
                    return;
                }
            }
            btn.textContent = '登录 / 注册';
            if (session) enterApp(session);
        }

        async function handleLogout() {
            await DB.signOut();
            document.getElementById('oaAccount').disabled = false;
            formData = { oaAccount: '', bizType: '', location: '', date: '', time: '' };
            reservations = [];
            document.getElementById('loggedBar').style.display = 'none';
            document.getElementById('tabSwitch').style.display = 'none';
            showLogin();
        }

        async function init() {
            renderDateOptions();
            renderTimeOptions();
            updateSubmitButton();
            try {
                await DB.init();
            } catch (e) {
                showToast('未连接到云端，请在 config.js 填入 Supabase 密钥', 'error');
                return;
            }
            const session = await DB.getSession();
            if (session) {
                enterApp(session);
            } else {
                showLogin();
            }
            DB.onAuthChange((s) => { if (!s) showLogin(); });
        }

        // ==================== 温馨提示 ====================
        function closeTipModal() {
            document.getElementById('tipModal').classList.remove('show');
            localStorage.setItem(TIP_SHOWN_KEY, '1');
        }

        // ==================== Tab 切换 ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-pill').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab-pill[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('formView').style.display = tab === 'form' ? 'block' : 'none';
            document.getElementById('recordsView').style.display = tab === 'records' ? 'block' : 'none';
            if (tab === 'records') {
                loadReservations().then(renderRecords);
            }
            document.querySelector('.main-content').scrollTop = 0;
        }

        // ==================== 选择器 ====================
        function openPicker(type) {
            currentPickerType = type;
            const options = type === 'bizType' ? bizTypes : locations;
            const currentVal = type === 'bizType' ? formData.bizType : formData.location;
            document.getElementById('pickerTitle').textContent = type === 'bizType' ? '选择业务类型' : '选择预约地点';
            document.getElementById('pickerOptions').innerHTML = options.map(opt =>
                `<div class="picker-opt ${opt === currentVal ? 'selected' : ''}" onclick="selectPickerOption('${opt.replace(/'/g, "\\'")}')">${opt}</div>`
            ).join('');
            document.getElementById('pickerModal').classList.add('show');
        }

        function selectPickerOption(value) {
            if (currentPickerType === 'bizType') {
                formData.bizType = value;
                const el = document.getElementById('bizTypeText');
                el.value = value;
                el.classList.add('has-value');
            } else {
                formData.location = value;
                const el = document.getElementById('locationText');
                el.value = value;
                el.classList.add('has-value');
            }
            closePicker();
            updateSubmitButton();
        }

        function closePicker() {
            document.getElementById('pickerModal').classList.remove('show');
        }

        // ==================== 日历选择器 ====================
        let calYear, calMonth; // 当前日历显示的年月（0-indexed month）

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            document.getElementById('calTitle').textContent = calYear + ' 年 ' + (calMonth + 1) + ' 月';
            const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=周日
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const prevDays = new Date(calYear, calMonth, 0).getDate();
            const today = new Date();
            today.setHours(0,0,0,0);
            let html = '';
            // 上月尾部
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div style="text-align:center;padding:8px 2px;font-size:13px;color:#ccc;">${prevDays - i}</div>`;
            }
            // 本月
            for (let d = 1; d <= daysInMonth; d++) {
                const thisDate = new Date(calYear, calMonth, d);
                thisDate.setHours(0,0,0,0);
                const dateStr = formatDate(thisDate);
                const isSelected = formData.date === dateStr;
                const isToday = thisDate.getTime() === today.getTime();
                const isPast = thisDate < today;
                let cls = 'cal-day';
                if (isSelected) cls += ' cal-sel';
                if (isToday) cls += ' cal-today';
                if (isPast) cls += ' cal-past';
                html += `<div class="${cls}" onclick="calSelect(${d})">${d}</div>`;
            }
            // 下月头部
            const totalCells = firstDay + daysInMonth;
            const nextCount = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= nextCount; i++) {
                html += `<div style="text-align:center;padding:8px 2px;font-size:13px;color:#ccc;">${i}</div>`;
            }
            grid.innerHTML = html;
        }

        function calMonth(delta) {
            calMonth += delta;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        }

        function calSelect(day) {
            const d = new Date(calYear, calMonth, day);
            // 不允许选过去
            const today = new Date();
            today.setHours(0,0,0,0);
            if (d < today) return;
            selectDate(formatDate(d));
        }

        function renderDateOptions() {} // 日历模式不需要

        function openDatePicker() {
            const today = new Date();
            // 初始化到当前月，如果已选过则跳到选中月份
            if (formData.date) {
                const parts = formData.date.split('-');
                calYear = parseInt(parts[0]);
                calMonth = parseInt(parts[1]) - 1;
            } else {
                calYear = today.getFullYear();
                calMonth = today.getMonth();
            }
            renderCalendar();
            document.getElementById('dateModal').classList.add('show');
        }

        function closeDatePicker() { document.getElementById('dateModal').classList.remove('show'); }

        function selectDate(dateStr) {
            formData.date = dateStr;
            const el = document.getElementById('dateText');
            el.value = dateStr;
            el.classList.add('has-value');
            closeDatePicker();
            updateSubmitButton();
        }

        function formatDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ==================== 时间 ====================
        function renderTimeOptions() {
            const times = ['10:00', '11:00', '14:00', '15:00', '16:00'];
            document.getElementById('timeOptions').innerHTML = times.map(t =>
                `<div class="picker-opt ${formData.time === t ? 'selected' : ''}" onclick="selectTime('${t}')" style="padding:14px 16px;font-size:15px;">${t}</div>`
            ).join('');
        }

        function openTimePicker() {
            renderTimeOptions();
            document.getElementById('timeModal').classList.add('show');
        }

        function selectTime(timeStr) {
            formData.time = timeStr;
            const el = document.getElementById('timeText');
            el.value = timeStr;
            el.classList.add('has-value');
            closeTimePicker();
            updateSubmitButton();
        }

        function closeTimePicker() { document.getElementById('timeModal').classList.remove('show'); }

        // ==================== 表单 ====================
        function validateForm() {
            formData.oaAccount = document.getElementById('oaAccount').value.trim();
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            const valid = formData.oaAccount && formData.bizType && formData.location && formData.date && formData.time;
            if (valid) {
                btn.className = 'btn-submit active';
                btn.textContent = '确认提交预约';
            } else {
                btn.className = 'btn-submit disabled';
                btn.textContent = '请完整填写表单';
            }
        }

        async function submitForm() {
            if (!formData.oaAccount || !formData.bizType || !formData.location || !formData.date || !formData.time) {
                showToast('请完整填写所有字段', 'error');
                return;
            }
            if (new Date(formData.date + 'T' + formData.time) < new Date()) {
                showToast('预约时间不能早于当前时间', 'error');
                return;
            }
            try {
                await DB.create({
                    oaAccount: formData.oaAccount,
                    bizType: formData.bizType,
                    location: formData.location,
                    date: formData.date,
                    time: formData.time
                });
                localStorage.setItem(LAST_OA_KEY, formData.oaAccount);
                resetForm();
                showToast('预约提交成功', 'success');
                switchTab('records');
                loadReservations().then(renderRecords);
            } catch (e) {
                showToast('提交失败：' + (e.message || e), 'error');
            }
        }

        function resetForm() {
            formData = { oaAccount: formData.oaAccount, bizType: '', location: '', date: '', time: '' };
            ['bizTypeText','locationText','dateText','timeText'].forEach(id => {
                const el = document.getElementById(id);
                const phMap = { bizTypeText:'请选择业务类型', locationText:'请选择预约地点', dateText:'请选择日期', timeText:'请选择时间' };
                el.value = '';
                el.classList.remove('has-value');
            });
            updateSubmitButton();
        }

        // ==================== 记录列表 ====================
        async function loadReservations() {
            try {
                reservations = await DB.list();
            } catch (e) {
                reservations = [];
                showToast('加载失败：' + (e.message || e), 'error');
            }
        }

        function renderRecords() {
            const container = document.getElementById('recordsList');
            const emptyState = document.getElementById('emptyState');
            if (reservations.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            container.innerHTML = reservations.map(r => {
                const sm = {
                    pending:  { cls:'', tag:'st-pending',   text:'待确认' },
                    confirmed:{ cls:'status-confirmed', tag:'st-confirmed', text:'已确认' },
                    rejected: { cls:'status-rejected', tag:'st-rejected',  text:'已拒绝' },
                    cancelled:{ cls:'status-cancelled',tag:'st-cancelled', text:'已取消' }
                };
                const s = sm[r.status] || sm.pending;
                return `
            <div class="record-card ${s.cls}">
              <div class="rc-head">
                <span class="rc-type">${r.bizType}</span>
                <span class="rc-status ${s.tag}">${s.text}</span>
              </div>
              <div class="rc-detail"><span>${r.oaAccount}</span><span>${r.location}</span></div>
              <div class="rc-detail"><span>${r.date}</span><span>${r.time}</span></div>
              <div class="rc-time">提交于 ${new Date(r.createdAt).toLocaleString('zh-CN')}</div>
              ${r.status === 'pending' ? `<div class="rc-action"><button class="btn-sm-action btn-sm-danger" onclick="cancelReservation('${r.id}')">取消预约</button></div>` : ''}
            </div>`;
            }).join('');
        }

        async function cancelReservation(id) {
            try {
                await DB.update(id, 'cancelled');
                showToast('预约已取消', 'error');
                loadReservations().then(renderRecords);
            } catch (e) {
                showToast('操作失败：' + (e.message || e), 'error');
            }
        }

        // ==================== 弹窗点击遮罩关闭 ====================
        document.getElementById('pickerModal').addEventListener('click', e => { if(e.target===e.currentTarget) closePicker(); });
        document.getElementById('dateModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeDatePicker(); });
        document.getElementById('timeModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeTimePicker(); });

        init();
    </script>
</body>
</html>
